<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula-09</title>
</head>
<body>
    <h1>Formulario</h1>
    <form action="malito:exemplo@exemplo.com" method="post" enctype="text/plain">
    <table border="3">
        <tr>
            <td>Nome:</td>
            <td><input type="text" name="nome-usuario" placeholder="Digite o nome"></td>
        </tr>
        <tr>
            <td>E-mail pessoal:</td>
            <td><input type="email" name="email1" id="idemail1" placeholder="Digite seu e-mail com @"></td>
        </tr>
        <tr>
            <td>E-mail (patter):</td>
            <td><input type="email" name="email2" id="idemail2" placeholder="Digite seu e-mail com @"></td>
        </tr>
        <tr>
            <td>Senha:</td>
            <td><input type="password" name="senha-usuario" id="senha"
                placeholder="Digite sua senha..."></td>
        </tr>
        <tr>
            <td>Idade:</td>
            <td><input type="number" name="number" id="" required></td>
        </tr>
        <tr>
            <td colspan="2"><textarea name="comment" cols="40" rows="10" id="" placeholder="Deixe um comentário..."></textarea></td>
        </tr>
        <tr>
            <td>Materia de interesse: <br>
            <input type="checkbox" name="" id="checkbox1" value="1">BackEnd <br>
            <input type="checkbox" name="" id="checkbox2" value="2">FrontEnd <br>
            <input type="checkbox" name="" id="checkbox3" value="True">FullStack</td>
            <td>Tipo de viagem: <br>
            <input type="radio" id="opcao1" name="opcao" value="Neg"> Negócios <br>
            <input type="radio" id="opcao2" name="opcao" value="Laz"> Lazer <br>
            <input type="radio" id="opcao3" name="opcao" value="Tur"> Turismo <br>
            <input type="radio" id="opcao4" name="opcao" value="Acad"> Acadêmico <br>
        </td>
        </tr>
        <tr>
            <td>
                <label for="">Esporte Favorito: <br></label>
            <select name="Esporte" size="4"><br>
                <option value="fut">Futebol</option>
                <option value="bas">Basquete</option>
                <option value="vol">Vôlei</option>
                <option value="ten">Tênis</option></select>
            </td>
                <td>
                    <label for="">Investimentos:</label>
            <select name="investimentos" size="1"><br>
                <option value="investimento1">Poupança</option>
                <option value="investimento2">CDB</option>
                <option value="investimento3">Tesouro Direto</option>
                <option value="investimento4">Fundos Imobiliários</option>
                <option value="investimento5">CDI</option>
                <option value="investimento6">Debêntures</option>
                <option value="investimento7">Criptomoedas</option>
                <option value="investimento8">Ações</option></select>
            </td>
        </tr>
        <tr>
            <td><label for="cor">Escolha uma cor:
                <input type="color" name="" id="">
            </label></td>
            <td><label for="">Escolha um arquivo:</label>
            <input type="file">
        </td>
        </tr>
        <tr>
            <td colspan="2">
                <label for="">Data e Hora envio:</label>
                <input type="date" required>
                <input type="time" name="" id="">
            </td>
        </tr>
        <td>
                 <input type="submit" value="Enviar">
        </td>
        <td>
                 <input type="reset" value="Limpar">
        </td>
    </table>

    </form>
</body>
</html>
